        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        
        .fallback-text {
            font-size: 18px;
            color: red;
            display: block;
        }
        
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
    <script>
        window.onload = function() {
            var iframe = document.querySelector('iframe');
            var fallbackText = document.querySelector('.fallback-text');

                iframe.style.display = 'none';
                fallbackText.style.display = 'block';
            };
        };
    </script>
</head>
